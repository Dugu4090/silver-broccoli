services:
  api:
    build: .
    ports: ["8000:8000"]
    env_file: .env
    depends_on: [postgres, redis, chroma, ollama]
    volumes: ["./:/app"]
    restart: unless-stopped

  worker:
    build: .
    command: celery -A app.celery_app.celery worker -l info -Q default,ingest
    env_file: .env
    depends_on: [postgres, redis, chroma, ollama]
    volumes: ["./:/app"]
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: studymate
      POSTGRES_USER: studymate
      POSTGRES_PASSWORD: studymate
    volumes: ["pgdata:/var/lib/postgresql/data"]
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "studymate"]
      interval: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  chroma:
    image: chromadb/chroma:0.5.5
    ports: ["8001:8000"]
    volumes: ["chromadata:/chroma/.chroma/index"]

  ollama:
    image: ollama/ollama:latest
    ports: ["11434:11434"]
    volumes: ["ollama:/root/.ollama"]

volumes:
  pgdata:
  chromadata:
  ollama:
